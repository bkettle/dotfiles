- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.config/nvim:
        create: true
        path: nvim
    ~/.zshrc:
        path: zshrc
    ~/.bashrc:
        path: bashrc
    ~/.zsh:
      path: zsh
    ~/.shell:
      path: shell
    ~/.tmux.conf:
        path: tmux
    ~/.config/git/config:
        create: true
        path: gitconfig
    ~/.config/git/ignore:
        create: true
        path: gitignore
    ~/.config/alacritty:
    ~/.config/darktable:
      glob: true
      path: darktable/**

- shell:
  - [git submodule update --init --recursive, Installing submodules]
